# WeatherBot configuration — copy to config.toml and edit.
# This file holds ONLY non-secret structure. Secrets (OpenWeather API key,
# Discord webhook URL) live in .env, never here (CONF-02).
#
# Validate this file WITHOUT sending a briefing:
#   weatherbot --check
# (validates schema + IANA timezones + units + template placeholders, makes ONE
#  live One Call reachability request, and confirms location names are unique).
#
# Resolve a city name to coordinates to paste below (setup-time only — the send
# path NEVER geocodes):
#   weatherbot --geocode "Austin, TX"
#   -> Austin, TX, US -> lat=30.2672  lon=-97.7431

# Which template to render (files live in templates/). Default is the sectioned
# briefing. Others: briefing-multiline.txt, briefing-compact.txt.
template = "briefing-sectioned.txt"

# Locations is a LIST even with one entry (D-06). Add more [[locations]] blocks
# to brief additional places. --send-now with no argument uses the first;
# --send-now "<name>" targets a specific one (case-insensitive). Location names
# must be unique. Each location REQUIRES an IANA `timezone` (authoritative for
# "today"/scheduling, D-03) and may set an optional `units` override
# ("imperial" or "metric"; omit to use the default).
[[locations]]
name = "Home"
lat = 40.7128
lon = -74.0060
timezone = "America/New_York"
# units = "imperial"   # optional per-location override (imperial | metric)

# Send schedule for this location. Add as many [[locations.schedule]] blocks as
# you like — each is one daily send slot, evaluated in the location's timezone.
#   time    : "HH:MM", 24-hour (e.g. "07:00", "08:30")
#   days    : a preset — "daily", "weekdays" (= "mon-fri"), "weekends"
#             (= "sat,sun") — OR a comma list of day tokens
#             (mon, tue, wed, thu, fri, sat, sun), e.g. "mon,wed,fri"
#   enabled : true to send, false to PAUSE the slot without deleting it
# A 7am weekday briefing for the weekday-home city:
[[locations.schedule]]
time = "07:00"
days = "mon-fri"
enabled = true

# A second location — e.g. a weekend travel city in a different IANA zone.
# This one sets `units = "metric"`, so ITS briefing renders metric-primary
# (e.g. "20°C (68°F)", "3.6 m/s (8 mph)") while "Home" above (units omitted)
# stays imperial-primary. The override changes ONLY which unit leads the display.
[[locations]]
name = "Weekend"
lat = 34.0522
lon = -118.2437
timezone = "America/Los_Angeles"
units = "metric"

# A later 8:30am briefing, only on the weekend (the travel city).
[[locations.schedule]]
time = "08:30"
days = "sat,sun"
enabled = true

# Discord webhook display identity (D-14) — non-secret presentation only.
[webhook]
username = "WeatherBot ☀️"
avatar_url = ""

# Retry budget for the two-burst send/fetch retry engine (D-07/D-09). This whole
# section is OPTIONAL — omit it and the safe defaults below apply, so --check
# passes on an un-edited file. Values are validated at load: attempts_per_burst
# must be >= 2 and the seconds fields > 0, and the ACTUAL jittered worst-case
# wall-clock — `(2n-2) * max(within_max, 120s Retry-After cap) + mid_pause`, where
# within_max = (burst_spread_seconds/(n-1)) * 1.5 — must stay UNDER the 90-minute
# (5400s) startup catch-up grace window, so a slow retry never outlives the window
# in which a missed slot is still re-fireable.
# [reliability]
#   attempts_per_burst   : tries per burst before pausing/giving up (default 8, min 2)
#   burst_spread_seconds : seconds each burst of attempts is spread over (default 600 = 10 min)
#   mid_pause_seconds    : single pause between the two bursts (default 2700 = 45 min)
# Defaults: worst case 14*max(128.6,120) + 2700 ≈ 4500s ≈ 75 min, under the 90-min grace.
# attempts_per_burst = 8
# burst_spread_seconds = 600
# mid_pause_seconds = 2700
